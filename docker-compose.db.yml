version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: evaluation_db
    restart: always
    environment:
      POSTGRES_USER: eval_user
      POSTGRES_PASSWORD: eval_secure_password_2026
      POSTGRES_DB: evaluation_telemetry
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"

volumes:
  pgdata:
